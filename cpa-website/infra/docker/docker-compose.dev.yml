services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cpa_dev
      POSTGRES_PASSWORD: cpa_dev_password
      POSTGRES_DB: cpa_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    working_dir: /workspace
    env_file:
      - ../../apps/backend/.env
    volumes:
      - ../..:/workspace:cached
      - pnpm-store:/pnpm-store
      - backend-node-modules:/workspace/node_modules
    environment:
      NODE_ENV: development
      PORT: 4000
      PNPM_HOME: /pnpm
      PNPM_STORE_PATH: /pnpm-store
      DATABASE_URL: postgres://cpa_dev:cpa_dev_password@postgres:5432/cpa_dev
    ports:
      - '4001:4000'
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    working_dir: /workspace
    volumes:
      - ../..:/workspace:cached
      - pnpm-store:/pnpm-store
      - frontend-node-modules:/workspace/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4001
      PNPM_HOME: /pnpm
      PNPM_STORE_PATH: /pnpm-store
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_started
volumes:
  postgres-data:
  pnpm-store:
  backend-node-modules:
  frontend-node-modules:
