services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cpa_dev
      POSTGRES_PASSWORD: cpa_dev_password
      POSTGRES_DB: cpa_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    working_dir: /workspace
    env_file:
      - ../../apps/backend/.env
    volumes:
      - ../..:/workspace:cached
      - pnpm-store:/pnpm-store
      - backend-node-modules:/workspace/node_modules
    environment:
      NODE_ENV: development
      PORT: 4000
      PNPM_HOME: /pnpm
      PNPM_STORE_PATH: /pnpm-store
      DATABASE_URL: postgres://cpa_dev:cpa_dev_password@postgres:5432/cpa_dev
      CORS_ORIGIN: http://localhost:3000
      DEMO_MODE: 'true'
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: portal-demo
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: 'true'
    ports:
      - '4001:4000'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    working_dir: /workspace
    volumes:
      - ../..:/workspace:cached
      - pnpm-store:/pnpm-store
      - frontend-node-modules:/workspace/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4001
      NEXT_PUBLIC_DEMO_MODE: 'true'
      PNPM_HOME: /pnpm
      PNPM_STORE_PATH: /pnpm-store
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_started
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/portal-demo &&
      mc cors set local/portal-demo /cors.json
      "
    volumes:
      - ./minio/cors.json:/cors.json:ro
volumes:
  postgres-data:
  pnpm-store:
  backend-node-modules:
  frontend-node-modules:
  minio-data:
